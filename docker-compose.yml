version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cdb_intel
      POSTGRES_USER: cdb_user
      POSTGRES_PASSWORD: cdb_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdb_user -d cdb_intel"]
      interval: 5s
      timeout: 5s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
      http.host: "0.0.0.0"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    environment:
      # Keep auth consistent across runs
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}

      # Point services to container hostnames
      DATABASE_URL: postgresql+psycopg2://cdb_user:cdb_pass@postgres:5432/cdb_intel
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: profiles_v1

      FRONTEND_ORIGIN: http://localhost:5173
      ELASTICSEARCH_TIMEOUT_SECONDS: 30
    volumes:
      # Allows pydantic BaseSettings to load env if needed
      - ./.env:/app/backend/.env:ro
      # Persist uploaded photos inside container filesystem for access via StaticFiles.
      - ./backend/uploads:/app/backend/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  es_data:

